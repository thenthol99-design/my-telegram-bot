<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STN Play - Professional Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chat-bubble-admin { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-bubble-user { background: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e2e8f0; }
        img, video { max-width: 250px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; }
        audio { height: 40px; width: 220px; margin-bottom: 5px; }
        
        .recording { animation: pulse 1.5s infinite; color: #ef4444; background: #fee2e2 !important; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div class="max-w-7xl mx-auto py-8 px-4">
        <div class="flex items-center justify-between mb-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <h1 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                <i class="fas fa-shield-check text-blue-600"></i> STN Play Control Center
            </h1>
            <span id="user-count-badge" class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold">0 Users</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-bullhorn text-orange-500"></i> Broadcast</h2>
                    <div class="space-y-3">
                        <input type="file" id="bc-file" accept="image/*,video/*,audio/ogg,audio/mpeg" class="text-xs w-full p-2 bg-slate-50 rounded-lg">
                        <select id="bc-target" class="w-full p-2 bg-slate-50 rounded-lg text-sm outline-none">
                            <option value="All">ទាំងអស់ (All)</option>
                            <option value="Target (Deposit)">អ្នកដាក់លុយ</option>
                            <option value="Non-Target (Trial)">អ្នកសាកល្បង</option>
                        </select>
                        <input type="number" id="bc-delay" value="0" class="w-full p-2 bg-slate-50 rounded-lg text-sm" placeholder="Delay (seconds)">
                        <textarea id="bc-msg" rows="2" class="w-full p-2 bg-slate-50 rounded-lg text-sm outline-none" placeholder="Message..."></textarea>
                        <button onclick="handleBroadcast()" id="bc-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">ផ្ញើចេញ</button>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 font-bold border-b bg-slate-50/50">👥 អតិថិជន</div>
                    <div class="max-h-[300px] overflow-y-auto" id="customer-list"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 flex overflow-hidden h-[700px]">
                    <div class="w-1/3 border-r bg-slate-50 flex flex-col">
                        <div class="p-4 font-bold border-b bg-white">💬 Inbox</div>
                        <div id="chat-sidebar" class="flex-1 overflow-y-auto"></div>
                    </div>

                    <div class="flex-1 flex flex-col bg-slate-50">
                        <div id="chat-header" class="p-4 font-bold text-blue-600 border-b bg-white flex justify-between items-center">
                            <span>សូមរើសភ្ញៀវម្នាក់...</span>
                        </div>
                        
                        <div id="chat-display" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3"></div>

                        <div class="p-4 bg-white border-t flex gap-3 items-center">
                            <input type="file" id="chat-file" class="hidden" accept="image/*,video/*,audio/ogg">
                            
                            <button onclick="document.getElementById('chat-file').click()" class="text-gray-400 hover:text-blue-600 p-2 rounded-full hover:bg-slate-100 transition-all">
                                <i class="fas fa-paperclip text-xl"></i>
                            </button>

                            <button id="mic-btn" onclick="toggleRecording()" class="text-gray-400 p-2 rounded-full hover:bg-slate-100 transition-all">
                                <i class="fas fa-microphone text-xl" id="mic-icon"></i>
                            </button>

                            <textarea id="chat-input" rows="1" class="flex-1 p-3 bg-slate-100 border-none rounded-2xl outline-none focus:ring-1 focus:ring-blue-500 text-sm resize-none" placeholder="សរសេរសារ..."></textarea>
                            
                            <button onclick="sendReply()" id="send-btn" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-blue-700 shadow-md transition-all active:scale-90">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, where, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBX7ilsfHusML1lGX3ZYcsdkuhSTlp-y_k",
            authDomain: "my-telegram-bot-46df4.firebaseapp.com",
            projectId: "my-telegram-bot-46df4",
            storageBucket: "my-telegram-bot-46df4.firebasestorage.app",
            messagingSenderId: "507163040303",
            appId: "1:507163040303:web:6a45bef2be586caf3a04da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let activeId = null;
        let unsubscribeChat = null;
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        onSnapshot(collection(db, "customers"), (snap) => {
            const list = document.getElementById('customer-list');
            const sidebar = document.getElementById('chat-sidebar');
            document.getElementById('user-count-badge').innerText = snap.size + " Users";
            list.innerHTML = ''; sidebar.innerHTML = '';

            snap.forEach(userDoc => {
                const u = userDoc.data();
                const id = userDoc.id;
                list.innerHTML += `<div class="p-3 border-b flex justify-between items-center text-xs">
                    <span class="font-bold text-slate-700">${u.name}</span>
                    <button onclick="deleteUser('${id}')" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>`;
                const btn = document.createElement('div');
                btn.className = `p-4 border-b cursor-pointer hover:bg-blue-50 transition-all flex items-center gap-3 ${activeId === id ? 'bg-blue-50 border-l-4 border-l-blue-600' : ''}`;
                btn.innerHTML = `<div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-sm">${u.name[0]}</div>
                    <div><div class="text-sm font-bold text-slate-800">${u.name}</div><div class="text-[10px] text-gray-400">${u.category || 'General'}</div></div>`;
                btn.onclick = () => selectUser(id, u.name);
                sidebar.appendChild(btn);
            });
        });

        window.selectUser = function(id, name) {
            activeId = id;
            document.getElementById('chat-header').innerText = "Chat with: " + name;
            if (unsubscribeChat) unsubscribeChat();
            const q = query(collection(db, "chats"), where("chat_id", "==", id), orderBy("timestamp", "asc"));
            unsubscribeChat = onSnapshot(q, (snap) => {
                const display = document.getElementById('chat-display');
                display.innerHTML = '';
                snap.forEach(msgDoc => {
                    const m = msgDoc.data();
                    const isMe = m.sender === 'admin';
                    let media = "";
                    if (m.media_url) {
                        if (m.media_type === 'photo') media = `<img src="${m.media_url}" onclick="window.open('${m.media_url}')">`;
                        else if (m.media_type === 'video') media = `<video src="${m.media_url}" controls></video>`;
                        else if (m.media_type === 'voice' || m.media_type === 'audio') media = `<audio src="${m.media_url}" controls></audio>`;
                    }
                    display.innerHTML += `<div class="p-3 max-w-[85%] rounded-2xl text-sm ${isMe ? 'chat-bubble-admin shadow-blue-200' : 'chat-bubble-user'} shadow-sm">
                        ${media} ${m.text ? `<div class="${media ? 'mt-2' : ''}">${m.text}</div>` : ""}
                    </div>`;
                });
                display.scrollTop = display.scrollHeight;
            });
        };

        // --- មុខងារថតសំឡេង (កែសម្រួលឱ្យផ្ញើជា .ogg) ---
        window.toggleRecording = async function() {
            if (!activeId) return alert("សូមជ្រើសរើសភ្ញៀវម្នាក់សិន!");
            const micIcon = document.getElementById('mic-icon');
            const micBtn = document.getElementById('mic-btn');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    // ឆែកមើលប្រភេទដែល Browser អាចប្រើបាន (Telegram ចូលចិត្ត opus)
                    const mimeType = MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') 
                                     ? 'audio/ogg;codecs=opus' 
                                     : 'audio/webm;codecs=opus';
                    
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: mimeType });
                        // បង្ខំកន្ទុយឱ្យទៅជា .ogg ដើម្បីឱ្យ Bot ស្គាល់
                        const storageRef = ref(storage, 'chat_media/voice_' + Date.now() + '.ogg');
                        
                        micBtn.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-600"></i>';
                        const snapshot = await uploadBytes(storageRef, audioBlob);
                        const mUrl = await getDownloadURL(snapshot.ref);
                        
                        // ផ្ញើទៅ admin_replies ជាប្រភេទ voice
                        await addDoc(collection(db, "admin_replies"), { chat_id: activeId, text: "", media_url: mUrl, media_type: "voice", timestamp: serverTimestamp() });
                        await addDoc(collection(db, "chats"), { chat_id: activeId, name: "Admin", text: "", media_url: mUrl, media_type: "voice", sender: "admin", timestamp: serverTimestamp() });
                        
                        micBtn.innerHTML = '<i class="fas fa-microphone text-xl" id="mic-icon"></i>';
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micIcon.classList.replace('fa-microphone', 'fa-stop');
                    micBtn.classList.add('recording');
                } catch (err) { alert("សូម Allow Microphone!"); }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                micIcon.classList.replace('fa-stop', 'fa-microphone');
                micBtn.classList.remove('recording');
            }
        };

        window.sendReply = async function() {
            const input = document.getElementById('chat-input');
            const fileInput = document.getElementById('chat-file');
            const file = fileInput.files[0];
            const text = input.value.trim();
            if (!activeId || (!text && !file)) return;

            try {
                let mUrl = "", mType = "none";
                if (file) {
                    const storageRef = ref(storage, 'chat_media/' + Date.now() + "_" + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    mUrl = await getDownloadURL(snapshot.ref);
                    
                    if (file.type.includes('image')) mType = 'photo';
                    else if (file.type.includes('video')) mType = 'video';
                    else if (file.type.includes('audio') || file.name.endsWith('.ogg')) mType = 'voice';
                }
                await addDoc(collection(db, "admin_replies"), { chat_id: activeId, text: text, media_url: mUrl, media_type: mType, timestamp: serverTimestamp() });
                await addDoc(collection(db, "chats"), { chat_id: activeId, name: "Admin", text: text, media_url: mUrl, media_type: mType, sender: "admin", timestamp: serverTimestamp() });
                input.value = ''; fileInput.value = '';
            } catch (e) { alert("Error!"); }
        };

        window.handleBroadcast = async function() {
            const file = document.getElementById('bc-file').files[0];
            const msg = document.getElementById('bc-msg').value;
            const target = document.getElementById('bc-target').value;
            const delay = document.getElementById('bc-delay').value;
            const btn = document.getElementById('bc-btn');
            if (!file && !msg.trim()) return;

            btn.disabled = true; btn.innerText = "Sending...";
            try {
                let mUrl = "", mType = "none";
                if (file) {
                    const storageRef = ref(storage, 'broadcasts/' + Date.now() + "_" + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    mUrl = await getDownloadURL(snapshot.ref);
                    
                    if (file.type.includes('image')) mType = 'photo';
                    else if (file.type.includes('video')) mType = 'video';
                    else if (file.type.includes('audio') || file.name.endsWith('.ogg')) mType = 'voice';
                }
                await addDoc(collection(db, "broadcasts"), { message: msg, target_category: target, media_type: mType, media_url: mUrl, delay_seconds: parseInt(delay) || 0, timestamp: serverTimestamp() });
                alert("✅ Broadcast Started!");
                document.getElementById('bc-msg').value = '';
            } catch (e) { alert("Error!"); }
            btn.disabled = false; btn.innerText = "ផ្ញើចេញ";
        };

        window.deleteUser = async (id) => { if(confirm("Delete User?")) await deleteDoc(doc(db, "customers", id)); };
    </script>
</body>
</html>
