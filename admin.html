<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STN Play - Professional Admin Dashboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="STN Admin">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8767/8767355.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chat-bubble-admin { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-bubble-user { background: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e2e8f0; }
        img, video { max-width: 250px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; }
        audio { height: 35px; width: 250px; max-width: 100%; }
        .recording { animation: pulse 1.5s infinite; color: #ef4444; background: #fee2e2 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900 relative">

    <!-- ផ្ទាំង Login (វានឹងបង្ហាញតែពេលមិនទាន់ Login) -->
    <div id="login-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-95 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <i class="fas fa-shield-check text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800">STN Admin Login</h1>
                <p class="text-sm text-slate-500 mt-2">សូមបញ្ចូលគណនីដើម្បីគ្រប់គ្រងប្រព័ន្ធ</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                    <input type="email" id="login-email" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" placeholder="admin@example.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                    <input type="password" id="login-password" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" placeholder="••••••••">
                </div>
                <p id="login-error" class="text-red-500 text-xs font-bold text-center hidden"></p>
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 mt-4">ចូលប្រព័ន្ធ (Login)</button>
            </div>
        </div>
    </div>

    <!-- ផ្ទាំង Dashboard ទាំងមូល (វានឹងលាក់សិន រហូតទាល់តែ Login រួច) -->
    <div id="main-dashboard" class="max-w-7xl mx-auto py-6 px-4 hidden">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <h1 class="text-xl md:text-2xl font-black text-slate-800 flex items-center gap-3">
                <i class="fas fa-shield-check text-blue-600"></i> STN Play Control Center
            </h1>
            <div class="flex items-center gap-4">
                <span id="user-count-badge" class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold shadow-md shadow-blue-200">0 Users</span>
                <button onclick="handleLogout()" class="text-red-500 hover:text-red-700 font-bold text-sm flex items-center gap-2 bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                    <i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline">Logout</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column: Broadcast & Customer List -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="font-bold mb-4 flex items-center gap-2 text-slate-700"><i class="fas fa-bullhorn text-orange-500"></i> Broadcast</h2>
                    <div class="space-y-3">
                        <input type="file" id="bc-file" accept="image/*,video/*,audio/*" class="text-xs w-full p-2 bg-slate-50 rounded-lg border border-slate-100">
                        <select id="bc-target" class="w-full p-2 bg-slate-50 rounded-lg text-sm outline-none border border-slate-100">
                            <option value="All">ទាំងអស់ (All)</option>
                            <option value="Target (Deposit)">អ្នកដាក់លុយ</option>
                            <option value="Non-Target (Trial)">អ្នកសាកល្បង</option>
                        </select>
                        <input type="number" id="bc-delay" value="0" class="w-full p-2 bg-slate-50 rounded-lg text-sm border border-slate-100" placeholder="Delay (seconds)">
                        <textarea id="bc-msg" rows="2" class="w-full p-2 bg-slate-50 rounded-lg text-sm outline-none border border-slate-100" placeholder="Message..."></textarea>
                        <button onclick="handleBroadcast()" id="bc-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">ផ្ញើចេញ</button>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 font-bold border-b bg-slate-50/50 flex items-center gap-2"><i class="fas fa-users text-blue-500"></i> អតិថិជន</div>
                    <div class="max-h-[300px] overflow-y-auto" id="customer-list"></div>
                </div>
            </div>

            <!-- Right Column: Chat Inbox -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 flex flex-col lg:flex-row overflow-hidden h-[85vh] lg:h-[720px]">
                    <!-- Chat Sidebar -->
                    <div class="w-full lg:w-1/3 h-[250px] lg:h-full border-b lg:border-r bg-slate-50/50 flex flex-col">
                        <div class="p-4 font-bold border-b bg-white flex items-center gap-2"><i class="fas fa-inbox text-blue-500"></i> Inbox</div>
                        <div id="chat-sidebar" class="flex-1 overflow-y-auto"></div>
                    </div>

                    <!-- Chat Box -->
                    <div class="flex-1 flex flex-col bg-white min-h-0">
                        <div id="chat-header" class="p-4 font-bold text-blue-600 border-b bg-white flex items-center gap-3">
                            <span class="text-slate-400 font-normal italic text-sm">សូមរើសភ្ញៀវម្នាក់ដើម្បីចាប់ផ្ដើមឆាត...</span>
                        </div>
                        
                        <div id="chat-display" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4 bg-slate-50/30"></div>

                        <!-- Chat Input -->
                        <div class="p-4 bg-white border-t flex gap-3 items-center">
                            <input type="file" id="chat-file" class="hidden" accept="image/*,video/*,audio/*">
                            <button onclick="document.getElementById('chat-file').click()" class="text-slate-400 hover:text-blue-600 p-2 rounded-full hover:bg-slate-100 transition-all">
                                <i class="fas fa-paperclip text-xl"></i>
                            </button>
                            <button id="mic-btn" onclick="toggleRecording()" class="text-slate-400 p-2 rounded-full hover:bg-slate-100 transition-all">
                                <i class="fas fa-microphone text-xl" id="mic-icon"></i>
                            </button>
                            <textarea id="chat-input" rows="1" class="flex-1 p-3 bg-slate-100 border-none rounded-2xl outline-none focus:ring-1 focus:ring-blue-500 text-sm resize-none" placeholder="សរសេរសារ..."></textarea>
                            <button onclick="sendReply()" id="send-btn" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-blue-700 shadow-md transition-all active:scale-90">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, where, orderBy, doc, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        // ថែមការទាញយកមុខងារ Auth ពី Firebase
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBX7ilsfHusMLi1gX3ZYcsdkuhST1p-y_k",
            authDomain: "my-telegram-bot-46df4.firebaseapp.com",
            projectId: "my-telegram-bot-46df4",
            storageBucket: "my-telegram-bot-46df4.firebasestorage.app",
            messagingSenderId: "507163040303",
            appId: "1:507163040303:web:6a45bef2be586caf3a04da"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app); // បង្កើតអនុគមន៍ Auth

        let activeId = null;
        let unsubscribeChat = null;
        let unsubscribeCustomers = null;
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // មុខងារពិនិត្យមើលថាតើ Admin បាន Login ហើយឬនៅ?
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // បើ Login ត្រូវ ឱ្យលាក់ផ្ទាំង Login ហើយបង្ហាញ Dashboard
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                initDashboard(); // ទាញយកទិន្នន័យមកបង្ហាញ
            } else {
                // បើមិនទាន់ Login ឬ Logout ឱ្យបង្ហាញផ្ទាំង Login វិញ
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-dashboard').classList.add('hidden');
                if (unsubscribeCustomers) unsubscribeCustomers();
                if (unsubscribeChat) unsubscribeChat();
            }
        });

        // មុខងារ Login
        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            
            if (!email || !password) return;
            
            btn.disabled = true;
            btn.innerText = "កំពុងផ្ទៀងផ្ទាត់...";
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                errorMsg.classList.add('hidden');
            } catch (error) {
                errorMsg.innerText = "❌ បញ្ហា: " + error.code; // <--- កែតែមួយជួរនេះទេ
                errorMsg.classList.remove('hidden');
                console.error("ពត៌មានលំអិតពីកំហុស:", error);
            }
            btn.disabled = false;
            btn.innerText = "ចូលប្រព័ន្ធ (Login)";
        };

        // មុខងារ Logout
        window.handleLogout = async () => {
            if (confirm("តើអ្នកពិតជាចង់ចាកចេញមែនទេ?")) {
                await signOut(auth);
            }
        };

        // មុខងារទាញយកទិន្នន័យ (ដំណើរការតែពេល Login រួច)
        function initDashboard() {
            unsubscribeCustomers = onSnapshot(collection(db, "customers"), (snap) => {
                const list = document.getElementById('customer-list');
                const sidebar = document.getElementById('chat-sidebar');
                document.getElementById('user-count-badge').innerText = snap.size + " Users";
                list.innerHTML = ''; sidebar.innerHTML = '';

                snap.forEach(userDoc => {
                    const u = userDoc.data();
                    const id = userDoc.id;

                    const avatarImg = u.profile_url 
                        ? `<img src="${u.profile_url}" class="w-10 h-10 rounded-full object-cover shadow-sm border border-slate-200">`
                        : `<div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-sm">${u.name ? u.name[0] : '?'}</div>`;

                    list.innerHTML += `<div class="p-3 border-b flex justify-between items-center text-xs">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-slate-700">${u.name}</span>
                        </div>
                        <button onclick="deleteUser('${id}')" class="text-red-300 hover:text-red-500 transition-colors"><i class="fas fa-trash"></i></button>
                    </div>`;
                    
                    const btn = document.createElement('div');
                    btn.className = `p-4 border-b cursor-pointer hover:bg-white transition-all flex items-center gap-3 ${activeId === id ? 'bg-white border-l-4 border-l-blue-600 shadow-sm' : ''}`;
                    btn.innerHTML = `
                        ${avatarImg}
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-bold text-slate-800 truncate">${u.name}</div>
                            <div class="text-[10px] text-gray-400">${u.category || 'General'}</div>
                        </div>`;
                    btn.onclick = () => selectUser(id, u.name, u.profile_url);
                    sidebar.appendChild(btn);
                });
            });
        }

        window.selectUser = async function(id, name, pUrl) {
            activeId = id;
            
            const headerAvatar = pUrl 
                ? `<img src="${pUrl}" class="w-8 h-8 rounded-full object-cover">`
                : `<div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold">${name[0]}</div>`;
            
            document.getElementById('chat-header').innerHTML = `
                <div class="flex items-center gap-3">
                    ${headerAvatar}
                    <div>
                        <div class="text-slate-800">${name}</div>
                        <div class="text-[10px] text-green-500 font-normal">Active Now</div>
                    </div>
                </div>`;
             
            if (unsubscribeChat) unsubscribeChat();

            const q = query(collection(db, "chats"), where("chat_id", "==", id), orderBy("timestamp", "asc"), limit(50));
            unsubscribeChat = onSnapshot(q, (snap) => {
                const display = document.getElementById('chat-display');
                display.innerHTML = '';
                
                snap.forEach(msgDoc => {
                    const m = msgDoc.data();
                    const isMe = m.sender === 'admin';
                    let media = "";
                    
                    if (m.media_url) {
                        if (m.media_type === 'photo') {
                            media = `<img src="${m.media_url}" class="rounded-xl shadow-sm mb-1 border border-slate-100" onclick="window.open('${m.media_url}')">`;
                        } else if (m.media_type === 'video') {
                            media = `<video src="${m.media_url}" controls preload="none" class="w-[200px] sm:w-[250px] h-[150px] object-cover rounded-xl shadow-sm mb-1 border border-slate-100 bg-slate-800"></video>`;
                        } else if (m.media_type === 'voice' || m.media_type === 'audio') {
                            media = `
                                <div class="bg-slate-50 p-2 rounded-lg border border-slate-100 mb-1">
                                    <audio controls preload="none" class="h-10 w-[200px] sm:w-[240px]">
                                        <source src="${m.media_url}" type="audio/ogg">
                                        <source src="${m.media_url}" type="audio/mpeg">
                                    </audio>
                                </div>`;
                        }
                    }

                    const chatAvatar = !isMe ? (pUrl 
                        ? `<img src="${pUrl}" class="w-7 h-7 rounded-full object-cover mt-auto">`
                        : `<div class="w-7 h-7 bg-slate-300 rounded-full flex items-center justify-center text-white text-[10px] font-bold mt-auto">${name[0]}</div>`) : '';

                    display.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'} w-full gap-2">
                            ${chatAvatar}
                            <div class="p-3 max-w-[80%] rounded-2xl text-sm ${isMe ? 'chat-bubble-admin shadow-blue-200' : 'chat-bubble-user shadow-sm'}">
                                ${media} 
                                ${m.text ? `<div class="break-words">${m.text}</div>` : ""}
                            </div>
                        </div>`;
                });
                display.scrollTop = display.scrollHeight;
            });
        };

        window.toggleRecording = async function() {
            if (!activeId) return alert("សូមជ្រើសរើសភ្ញៀវម្នាក់សិន!");
            const micIcon = document.getElementById('mic-icon');
            const micBtn = document.getElementById('mic-btn');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mimeType = MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') ? 'audio/ogg;codecs=opus' : 'audio/webm;codecs=opus';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: mimeType });
                        const storageRef = ref(storage, 'chat_media/voice_' + Date.now() + '.ogg');
                        micBtn.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-600"></i>';
                        const snapshot = await uploadBytes(storageRef, audioBlob);
                        const mUrl = await getDownloadURL(snapshot.ref);
                        
                        const msgData = { chat_id: activeId, name: "Admin", text: "", media_url: mUrl, media_type: "voice", sender: "admin", timestamp: serverTimestamp() };
                        await addDoc(collection(db, "admin_replies"), { chat_id: activeId, text: "", media_url: mUrl, media_type: "voice", timestamp: serverTimestamp() });
                        await addDoc(collection(db, "chats"), msgData);
                        
                        micBtn.innerHTML = '<i class="fas fa-microphone text-xl" id="mic-icon"></i>';
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    micIcon.classList.replace('fa-microphone', 'fa-stop');
                    micBtn.classList.add('recording');
                } catch (err) { alert("សូមអនុញ្ញាតប្រើ Microphone!"); }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                micIcon.classList.replace('fa-stop', 'fa-microphone');
                micBtn.classList.remove('recording');
            }
        };

        window.sendReply = async function() {
            const input = document.getElementById('chat-input');
            const fileInput = document.getElementById('chat-file');
            const file = fileInput.files[0];
            const text = input.value.trim();
            if (!activeId || (!text && !file)) return;
            
            try {
                let mUrl = "", mType = "none";
                if (file) {
                    const storageRef = ref(storage, 'chat_media/' + Date.now() + "_" + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    mUrl = await getDownloadURL(snapshot.ref);
                    if (file.type.includes('image')) mType = 'photo';
                    else if (file.type.includes('video')) mType = 'video';
                    else if (file.type.includes('audio')) mType = 'voice';
                }
                
                const msgData = { chat_id: activeId, name: "Admin", text: text, media_url: mUrl, media_type: mType, sender: "admin", timestamp: serverTimestamp() };
                await addDoc(collection(db, "admin_replies"), { chat_id: activeId, text: text, media_url: mUrl, media_type: mType, timestamp: serverTimestamp() });
                await addDoc(collection(db, "chats"), msgData);
                
                input.value = ''; fileInput.value = '';
            } catch (e) { console.error(e); }
        };

        window.handleBroadcast = async function() {
            const file = document.getElementById('bc-file').files[0];
            const msg = document.getElementById('bc-msg').value;
            const target = document.getElementById('bc-target').value;
            const delay = document.getElementById('bc-delay').value;
            const btn = document.getElementById('bc-btn');
            if (!file && !msg.trim()) return;
            btn.disabled = true; btn.innerText = "Sending...";
            try {
                let mUrl = "", mType = "none";
                if (file) {
                    const storageRef = ref(storage, 'broadcasts/' + Date.now() + "_" + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    mUrl = await getDownloadURL(snapshot.ref);
                    if (file.type.includes('image')) mType = 'photo';
                    else if (file.type.includes('video')) mType = 'video';
                    else if (file.type.includes('audio')) mType = 'voice';
                }
                await addDoc(collection(db, "broadcasts"), { message: msg, target_category: target, media_type: mType, media_url: mUrl, delay_seconds: parseInt(delay) || 0, timestamp: serverTimestamp() });
                alert("✅ ការផ្ញើព័ត៌មានត្រូវបានចាប់ផ្ដើម!");
                document.getElementById('bc-msg').value = '';
                document.getElementById('bc-file').value = '';
            } catch (e) { alert("Error!"); }
            btn.disabled = false; btn.innerText = "ផ្ញើចេញ";
        };

        window.deleteUser = async (id) => { if(confirm("តើអ្នកពិតជាចង់លុបអតិថិជននេះមែនទេ?")) await deleteDoc(doc(db, "customers", id)); };
    </script>
</body>
</html>
